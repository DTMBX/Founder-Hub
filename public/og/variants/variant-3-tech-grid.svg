<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c16;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1120;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(157, 224, 173, 0.06)" stroke-width="1"/>
    </pattern>
    <pattern id="circuits" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="2" fill="rgba(157, 224, 173, 0.15)"/>
      <circle cx="90" cy="90" r="2" fill="rgba(157, 224, 173, 0.15)"/>
      <line x1="30" y1="30" x2="90" y2="30" stroke="rgba(157, 224, 173, 0.08)" stroke-width="1"/>
      <line x1="90" y1="30" x2="90" y2="90" stroke="rgba(157, 224, 173, 0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#circuits)"/>
  
  <text x="120" y="200" font-family="JetBrains Mono, monospace" font-size="24" font-weight="500" 
        fill="rgba(157, 224, 173, 0.5)" letter-spacing="2">&lt;Founder Hub /&gt;</text>
  
  <text x="600" y="310" font-family="Space Grotesk, system-ui, sans-serif" font-size="68" font-weight="700" 
        text-anchor="middle" fill="#f0f3f5" letter-spacing="-1">Devon Tyler Barber</text>
  
  <text x="600" y="370" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="500" 
        text-anchor="middle" fill="#9de0ad">Founder &amp; Innovator</text>
  
  <rect x="300" y="400" width="600" height="1" fill="rgba(157, 224, 173, 0.3)"/>
  
  <text x="600" y="455" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" 
        text-anchor="middle" fill="rgba(240, 243, 245, 0.7)">Building at the intersection of</text>
  
  <text x="600" y="490" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" 
        text-anchor="middle" fill="rgba(240, 243, 245, 0.7)">technology, transparency, and justice</text>
  
  <text x="600" y="560" font-family="JetBrains Mono, monospace" font-size="20" font-weight="500" 
        text-anchor="middle" fill="rgba(157, 224, 173, 0.7)" letter-spacing="1">devon-tyler.com</text>
</svg>
