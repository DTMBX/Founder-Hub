<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate OG Image PNG</title>
    <style>
        body { font-family: system-ui; padding: 40px; background: #1a1a2e; color: #fff; }
        canvas { border: 1px solid #333; margin: 20px 0; display: block; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; margin-right: 10px; background: #9de0ad; border: none; border-radius: 6px; }
        .preview { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>OG Image Generator</h1>
    <p>Click to generate and download the patriotic-themed social share image (1200x630).</p>
    
    <div class="preview">
        <canvas id="canvas" width="1200" height="630"></canvas>
    </div>
    
    <button onclick="downloadPNG()">Download og-preview.png</button>
    
    <p style="margin-top: 30px; opacity: 0.7;">
        After downloading, place <code>og-preview.png</code> in the <code>public/</code> folder and commit.
    </p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function drawOGImage() {
    // Background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 1200, 0);
    bgGrad.addColorStop(0, '#0a0e1a');
    bgGrad.addColorStop(0.5, '#0d1120');
    bgGrad.addColorStop(1, '#0a0e1a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, 1200, 630);
    
    // Subtle stripes (flag-inspired)
    ctx.globalAlpha = 0.1;
    const stripeHeight = 630 / 13;
    for (let i = 0; i < 13; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#1a2030' : '#0a0e1a';
        ctx.fillRect(0, i * stripeHeight, 1200, stripeHeight);
    }
    ctx.globalAlpha = 1;
    
    // Stars pattern (left canton area)
    ctx.globalAlpha = 0.3;
    const starPositions = [
        [50, 80], [120, 50], [180, 100], [80, 150], [150, 180],
        [220, 60], [280, 120], [100, 250], [200, 280], [300, 200],
        [60, 350], [140, 400], [240, 350], [180, 450], [100, 500],
        [280, 480], [340, 380], [320, 280], [380, 150], [350, 50]
    ];
    ctx.fillStyle = '#9de0ad';
    starPositions.forEach(([x, y]) => {
        ctx.beginPath();
        ctx.arc(x, y, 2 + Math.random() * 2, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    // Vertical accent bar
    ctx.fillStyle = 'rgba(157, 224, 173, 0.4)';
    ctx.fillRect(420, 180, 4, 270);
    
    // Name
    ctx.fillStyle = '#f0f3f5';
    ctx.font = 'bold 72px system-ui, -apple-system, sans-serif';
    ctx.fillText('Devon Tyler Barber', 450, 260);
    
    // Title
    ctx.fillStyle = '#9de0ad';
    ctx.font = '500 32px system-ui, -apple-system, sans-serif';
    ctx.fillText('Founder & Innovator', 450, 320);
    
    // Tagline
    ctx.fillStyle = 'rgba(240, 243, 245, 0.75)';
    ctx.font = '400 24px system-ui, -apple-system, sans-serif';
    ctx.fillText('Transformative solutions at the intersection', 450, 380);
    ctx.fillText('of technology, transparency, and justice', 450, 415);
    
    // Domain
    ctx.fillStyle = 'rgba(157, 224, 173, 0.8)';
    ctx.font = '500 22px monospace';
    ctx.fillText('devon-tyler.com', 120, 560);
    
    // USA Flag icon (small, bottom right)
    drawMiniFlag(1050, 520, 80, 42);
}

function drawMiniFlag(x, y, w, h) {
    const stripeH = h / 13;
    
    // Stripes
    for (let i = 0; i < 13; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#b22234' : '#ffffff';
        ctx.fillRect(x, y + i * stripeH, w, stripeH);
    }
    
    // Blue canton
    const cantonW = w * 0.4;
    const cantonH = stripeH * 7;
    ctx.fillStyle = '#3c3b6e';
    ctx.fillRect(x, y, cantonW, cantonH);
    
    // Stars (simplified)
    ctx.fillStyle = '#ffffff';
    const starSize = 1.5;
    for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
            const sx = x + 4 + col * (cantonW / 5);
            const sy = y + 3 + row * (cantonH / 5);
            ctx.beginPath();
            ctx.arc(sx, sy, starSize, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function downloadPNG() {
    const link = document.createElement('a');
    link.download = 'og-preview.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

// Draw on load
drawOGImage();
</script>
</body>
</html>
