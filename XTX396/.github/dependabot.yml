# Dependabot Configuration
# https://docs.github.com/en/code-security/dependabot
# Chain B9 - Continuous Monitoring

version: 2

registries:
  npm-registry:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: true

updates:
  # NPM Dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
      - "security-review"
    reviewers:
      - "DTMBX"
    # Security updates are prioritized
    allow:
      - dependency-type: "all"
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - "*"
      production-deps:
        patterns:
          - "react*"
          - "@radix-ui/*"
          - "tailwind*"
          - "framer-motion"
        update-types:
          - "minor"
          - "patch"
      dev-deps:
        patterns:
          - "@types/*"
          - "eslint*"
          - "vitest*"
          - "typescript*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore major version updates for stability
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "ci/cd"
      - "automated"
    reviewers:
      - "DTMBX"

  # Dev Containers
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "devcontainer"
    labels:
      - "devcontainer"
      - "automated"
