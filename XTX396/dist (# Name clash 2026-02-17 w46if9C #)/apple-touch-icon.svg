<svg width="180" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12172b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" fill="url(#appleGradient)"/>
  
  <!-- Border -->
  <rect x="10" y="10" width="160" height="160" fill="none" stroke="#9de0ad" stroke-width="2"/>
  
  <!-- xTx text -->
  <text x="90" y="80" font-family="sans-serif" font-size="48" font-weight="bold" 
        text-anchor="middle" dominant-baseline="middle" fill="#9de0ad">xTx</text>
  
  <!-- 396 text -->
  <text x="90" y="120" font-family="sans-serif" font-size="18" font-weight="500" 
        text-anchor="middle" dominant-baseline="middle" fill="rgba(157, 224, 173, 0.6)">396</text>
</svg>
