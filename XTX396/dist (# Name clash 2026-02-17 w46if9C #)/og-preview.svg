<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#12172b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9de0ad;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#9de0ad;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#9de0ad;stop-opacity:0" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="rgba(157, 224, 173, 0.08)"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Dot pattern -->
  <rect width="1200" height="630" fill="url(#dots)"/>
  
  <!-- Large xTx watermark -->
  <text x="600" y="200" font-family="sans-serif" font-size="180" font-weight="bold" 
        text-anchor="middle" fill="rgba(157, 224, 173, 0.15)">xTx</text>
  
  <!-- Accent line -->
  <rect x="200" y="248" width="800" height="2" fill="url(#accentLine)"/>
  
  <!-- Name -->
  <text x="600" y="340" font-family="sans-serif" font-size="64" font-weight="bold" 
        text-anchor="middle" fill="#f0f3f5">Devon Tyler Barber</text>
  
  <!-- Tagline -->
  <text x="600" y="400" font-family="sans-serif" font-size="32" font-weight="500" 
        text-anchor="middle" fill="#9de0ad">Founder &amp; Innovator</text>
  
  <!-- Description line 1 -->
  <text x="600" y="460" font-family="sans-serif" font-size="24" font-weight="400" 
        text-anchor="middle" fill="rgba(240, 243, 245, 0.75)">Transformative solutions at the intersection</text>
  
  <!-- Description line 2 -->
  <text x="600" y="495" font-family="sans-serif" font-size="24" font-weight="400" 
        text-anchor="middle" fill="rgba(240, 243, 245, 0.75)">of technology, transparency, and justice</text>
  
  <!-- Domain -->
  <text x="600" y="560" font-family="monospace" font-size="22" font-weight="500" 
        text-anchor="middle" fill="rgba(157, 224, 173, 0.8)">xTx396.com</text>
</svg>
