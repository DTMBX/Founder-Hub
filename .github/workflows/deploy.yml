# ──────────────────────────────────────────────────────────
# GitHub Pages Deploy — xtx396.com
# Builds the Vite/React app and deploys dist/ to Pages.
#
# IMPORTANT: This deploys the STATIC frontend only.
# Public site renders with localStorage KV values backed
# by static JSON defaults from /data/*.json.
# Admin panel writes persist to localStorage.
# ──────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: only what Pages needs
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deploys — let the latest finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify prerequisites
        run: npm run verify

      - name: Run tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Build
        run: npm run build

      - name: Generate static client sites
        run: node scripts/generate-static-sites.mjs
        env:
          SITE_BASE_URL: https://xtx396.com

      - name: Generate preview artifacts
        run: npm run generate:previews -- --skip-server
        env:
          CI: true
        continue-on-error: true

      - name: Verify preview artifacts
        run: node scripts/verify-previews.mjs
        continue-on-error: true

      - name: Inject CNAME for custom domain
        run: echo 'xtx396.com' > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ── Deploy ───────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
