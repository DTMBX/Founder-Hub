# ──────────────────────────────────────────────────────────
# GitHub Pages Deploy — xtx396.com
# Builds the Vite/React app and deploys dist/ to Pages.
#
# IMPORTANT: This deploys the STATIC frontend only.
# The @github/spark proxy.js (KV backend) does NOT run on
# Pages. Public site renders with default KV values.
# Admin panel / KV writes require the Spark runtime or a
# separate Node.js host running `node dist/proxy.js`.
# ──────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: only what Pages needs
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent overlapping deploys — let the latest finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Inject CNAME for custom domain
        run: echo 'xtx396.com' > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ── Deploy ───────────────────────────────────────────────
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
