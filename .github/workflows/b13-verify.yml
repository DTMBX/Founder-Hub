# B13 Verification Workflow
# Validates B13 source code protection artifacts:
#   - Backup service type-checks
#   - Restore service type-checks
#   - Anti-deletion guard tests
#   - Escrow manifest schema
#   - Security policy file presence
#   - Hook script presence

name: B13 Verify

on:
  push:
    branches: [main]
    paths:
      - 'ops/backup/**'
      - 'governance/security/**'
      - 'scripts/security/**'
      - 'docs/security/**'
  pull_request:
    branches: [main]
    paths:
      - 'ops/backup/**'
      - 'governance/security/**'
      - 'scripts/security/**'
      - 'docs/security/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  CI: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # TYPECHECK — Gate A: Ensure B13 TypeScript compiles
  # ─────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (Gate A)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────────────────
  # UNIT TESTS — Gate B: Run B13 backup/restore/escrow/guard tests
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Gate B)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run B13 tests
        run: npx vitest run ops/__tests__/b13-backup.test.ts --reporter=verbose

  # ─────────────────────────────────────────────────────────────────────────────
  # ARTIFACT PRESENCE — Gate E: Verify all B13 deliverables exist
  # ─────────────────────────────────────────────────────────────────────────────
  artifact-presence:
    name: Artifact Presence (Gate E)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify backup system files
        run: |
          echo "Checking B13-P2: Backup system..."
          test -f ops/backup/BackupService.ts
          test -f ops/backup/providers/LocalProvider.ts
          test -f ops/backup/providers/OffsiteProviderStub.ts
          test -f scripts/security/backup.ps1
          test -f scripts/security/backup-verify.ps1
          test -f docs/security/backups.md
          test -f governance/security/backup_policy.md

      - name: Verify restore drill files
        run: |
          echo "Checking B13-P3: Restore drill..."
          test -f ops/backup/RestoreService.ts
          test -f scripts/security/restore-drill.ps1
          test -f governance/security/restore_drill_policy.md

      - name: Verify escrow files
        run: |
          echo "Checking B13-P4: Artifact escrow..."
          test -f ops/backup/ArtifactEscrowService.ts
          test -f governance/security/escrow_policy.md

      - name: Verify break-glass files
        run: |
          echo "Checking B13-P5: Break-glass protocol..."
          test -f governance/security/break_glass_playbook.md
          test -f governance/security/break_glass_checklists.md
          test -f scripts/security/break-glass.ps1

      - name: Verify registry strategy
        run: |
          echo "Checking B13-P6: Private registry..."
          test -f docs/security/private-registry-strategy.md

      - name: Verify workstation hardening files
        run: |
          echo "Checking B13-P7: Workstation hardening..."
          test -f scripts/security/workstation-hardening.ps1
          test -f governance/security/workstation_hardening_policy.md

      - name: Verify anti-deletion guard files
        run: |
          echo "Checking B13-P8: Anti-deletion guardrails..."
          test -f ops/backup/AntiDeletionGuard.ts
          test -f scripts/security/pre-commit-guard.ps1
          test -f scripts/security/pre-push-guard.ps1
          test -f governance/security/protected_paths_policy.md

      - name: Verify critical assets inventory
        run: |
          echo "Checking B13-P1: Critical assets..."
          test -f governance/security/critical_assets_inventory.md
          test -f governance/security/repo_criticality_map.json

      - name: Verify governance schema (JSON valid)
        run: |
          echo "Validating repo_criticality_map.json..."
          node -e "JSON.parse(require('fs').readFileSync('governance/security/repo_criticality_map.json','utf8'))"
          echo "Valid JSON."

      - name: Summary
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "  B13 VERIFICATION: ALL ARTIFACTS PRESENT"
          echo "═══════════════════════════════════════════════════"
