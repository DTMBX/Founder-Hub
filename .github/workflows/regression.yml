# Daily Regression — Playwright Smoke Tests Against Production
# Runs every day at 07:00 UTC and on demand.
# Executes the E2E smoke suite against the live production site
# to catch regressions that slip past the PR-level CI.

name: Daily Regression

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  BASE_URL: https://devon-tyler.com

jobs:
  smoke-tests:
    name: Playwright Smoke Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npx playwright test --config playwright-e2e.config.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.BASE_URL }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14
