# Environment-Based Deploy Workflow
# Implements approval gates for staging and production deployments

name: Deploy

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - preview
          - staging
          - production
      skip_tests:
        description: "Skip tests (emergency only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # DETERMINE ENVIRONMENT
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine.outputs.environment }}
      should_deploy: ${{ steps.determine.outputs.should_deploy }}
    
    steps:
      - name: Determine target environment
        id: determine
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            ENV="staging"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            ENV="preview"
          else
            ENV="none"
          fi
          
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "should_deploy=$([[ $ENV != 'none' ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "🎯 Target environment: ${ENV}"

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD & TEST
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_deploy == 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        if: ${{ inputs.skip_tests != true }}
        run: npm test
      
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # PREVIEW DEPLOY (No approval needed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'preview'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deploy_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
      
      - name: Deploy to Netlify Preview
        id: deploy
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --alias=pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.NETLIFY_URL }}';
            const sha = '${{ github.sha }}'.substring(0, 7);
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployed\n\n**URL:** ${url}\n**Commit:** \`${sha}\`\n\nThis preview will be updated on each push.`
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGING DEPLOY (Requires staging environment approval)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.xtx396.com
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
      
      - name: Deploy to Staging
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --alias=staging
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Notify staging deploy
        run: |
          echo "✅ Deployed to staging"
          echo "URL: https://staging.xtx396.com"
          echo "Commit: ${{ github.sha }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # PRODUCTION DEPLOY (Requires production environment approval)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'production'
    environment:
      name: production
      url: https://xtx396.com
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
      
      - name: Check deployment window
        run: |
          HOUR=$(TZ="America/New_York" date +%H)
          DAY=$(TZ="America/New_York" date +%u)
          
          echo "Current hour (ET): $HOUR"
          echo "Current day: $DAY (1=Mon, 7=Sun)"
          
          # Warn if outside deployment window (Mon-Thu, 9AM-4PM ET)
          if [ "$DAY" -gt 4 ]; then
            echo "⚠️ WARNING: Deploying outside recommended window (weekday)"
          fi
          
          if [ "$HOUR" -lt 9 ] || [ "$HOUR" -gt 16 ]; then
            echo "⚠️ WARNING: Deploying outside recommended window (9AM-4PM ET)"
          fi
      
      - name: Record pre-deploy state
        id: pre_deploy
        run: |
          # Record current production commit for rollback
          echo "pre_deploy_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      
      - name: Deploy to Production
        id: deploy
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Verify deployment
        run: |
          echo "Verifying production deployment..."
          
          # Basic health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://xtx396.com)
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed: HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Production deployment verified"
      
      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.sha }}'.substring(0, 7);
            const url = 'https://xtx396.com';
            const timestamp = new Date().toISOString();
            
            // Create a deployment tag
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/deploy-prod-${sha}`,
              sha: context.sha
            }).catch(() => console.log('Tag may already exist'));
            
            console.log(`Production deployment recorded: ${sha} at ${timestamp}`);

  # ─────────────────────────────────────────────────────────────────────────────
  # POST-DEPLOY NOTIFICATION
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [setup, deploy-preview, deploy-staging, deploy-production]
    if: always() && needs.setup.outputs.should_deploy == 'true'
    
    steps:
      - name: Deployment summary
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          SHA="${{ github.sha }}"
          
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${ENV} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY
