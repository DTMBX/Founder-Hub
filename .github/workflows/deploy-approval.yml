# Environment-Based Deploy Workflow
# Implements approval gates for staging and production deployments

name: Deploy

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - preview
          - staging
          - production
      skip_tests:
        description: "Skip tests (emergency only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # DETERMINE ENVIRONMENT
  # ─────────────────────────────────────────────────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine.outputs.environment }}
      should_deploy: ${{ steps.determine.outputs.should_deploy }}
    
    steps:
      - name: Determine target environment
        id: determine
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            ENV="staging"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            ENV="preview"
          else
            ENV="none"
          fi
          
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "should_deploy=$([[ $ENV != 'none' ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "🎯 Target environment: ${ENV}"

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD & TEST
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.should_deploy == 'true'
    outputs:
      signature_verified: ${{ steps.verify-signature.outputs.verified }}
      signature_reason: ${{ steps.verify-signature.outputs.reason }}
      provenance_hash: ${{ steps.provenance.outputs.provenance_hash }}
      manifest_hash: ${{ steps.provenance.outputs.manifest_hash }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verify commit signature
        id: verify-signature
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get commit verification status from GitHub API
          VERIFICATION=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} \
            --jq '.commit.verification | {verified, reason}')
          
          VERIFIED=$(echo "$VERIFICATION" | jq -r '.verified')
          REASON=$(echo "$VERIFICATION" | jq -r '.reason')
          
          echo "verified=$VERIFIED" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          
          if [ "$VERIFIED" = "true" ]; then
            echo "✅ Commit signature verified: $REASON"
          else
            echo "⚠️ Commit signature status: $REASON"
            echo "Note: GitHub web merges are signed by GitHub"
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        if: ${{ inputs.skip_tests != true }}
        run: npm test
      
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          # ── Admin credentials (set in: GitHub repo → Settings → Secrets → Actions)
          VITE_ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          VITE_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      
      - name: Generate site manifest
        run: |
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const path = require('path');
            
            function sha256(content) {
              return crypto.createHash('sha256').update(content).digest('hex');
            }
            
            function hashFile(filePath) {
              const content = fs.readFileSync(filePath);
              return sha256(content);
            }
            
            function walkDir(dir, baseDir = dir) {
              const files = [];
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  files.push(...walkDir(fullPath, baseDir));
                } else {
                  files.push({
                    path: path.relative(baseDir, fullPath).replace(/\\\\/g, '/'),
                    sha256: hashFile(fullPath),
                    size: fs.statSync(fullPath).size
                  });
                }
              }
              return files;
            }
            
            const distDir = './dist';
            const files = walkDir(distDir);
            files.sort((a, b) => a.path.localeCompare(b.path));
            
            const manifest = {
              schemaVersion: '1.0.0',
              siteId: 'xtx396',
              siteName: 'XTX396',
              versionId: '${{ github.sha }}'.substring(0, 7),
              build: {
                buildId: crypto.randomUUID(),
                buildStartedAt: new Date().toISOString(),
                sourceCommitSha: '${{ github.sha }}',
                branch: '${{ github.ref_name }}',
              },
              files: files,
              stats: {
                totalFiles: files.length,
                totalSize: files.reduce((sum, f) => sum + f.size, 0),
              }
            };
            
            // Compute manifest hash
            const { manifestHash, ...rest } = manifest;
            manifest.manifestHash = sha256(JSON.stringify(rest, Object.keys(rest).sort()));
            
            fs.writeFileSync(
              path.join(distDir, 'manifest.json'),
              JSON.stringify(manifest, null, 2)
            );
            
            console.log('✅ Generated manifest.json');
            console.log('   Files:', manifest.stats.totalFiles);
            console.log('   Size:', Math.round(manifest.stats.totalSize / 1024), 'KB');
            console.log('   Hash:', manifest.manifestHash.substring(0, 12) + '...');
          "
      
      - name: Generate build provenance
        id: provenance
        run: |
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const path = require('path');
            
            // Read manifest for hash and stats
            const manifest = JSON.parse(fs.readFileSync('./dist/manifest.json', 'utf8'));
            
            // Build provenance record
            const provenance = {
              schemaVersion: '1.0.0',
              workflowRunId: '${{ github.run_id }}',
              workflowName: '${{ github.workflow }}',
              repository: '${{ github.repository }}',
              commitSha: '${{ github.sha }}',
              ref: '${{ github.ref }}',
              builtAt: new Date().toISOString(),
              builderId: 'github-actions',
              manifestHash: manifest.manifestHash,
              artifactSize: manifest.stats.totalSize,
              fileCount: manifest.stats.totalFiles,
              signatureVerified: '${{ steps.verify-signature.outputs.verified }}' === 'true',
              signatureReason: '${{ steps.verify-signature.outputs.reason }}'
            };
            
            // Compute provenance hash (excluding the hash field itself)
            const { provenanceHash, ...rest } = provenance;
            provenance.provenanceHash = crypto
              .createHash('sha256')
              .update(JSON.stringify(rest, Object.keys(rest).sort()))
              .digest('hex');
            
            // Write provenance file
            fs.writeFileSync(
              './dist/provenance.json',
              JSON.stringify(provenance, null, 2)
            );
            
            // Output key values for later steps
            console.log('✅ Generated provenance.json');
            console.log('   Run ID:', provenance.workflowRunId);
            console.log('   Commit:', provenance.commitSha.substring(0, 7));
            console.log('   Hash:', provenance.provenanceHash.substring(0, 12) + '...');
            console.log('   Signature:', provenance.signatureVerified ? '✓ Verified' : '○ Not verified');
            
            // Export for GitHub Actions
            const outputFile = process.env.GITHUB_OUTPUT;
            if (outputFile) {
              fs.appendFileSync(outputFile, 
                'provenance_hash=' + provenance.provenanceHash + '\n' +
                'manifest_hash=' + provenance.manifestHash + '\n'
              );
            }
          "
      
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # PREVIEW DEPLOY (No approval needed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'preview'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deploy_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
      
      - name: Deploy to Netlify Preview
        id: deploy
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --alias=pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.NETLIFY_URL }}';
            const sha = '${{ github.sha }}'.substring(0, 7);
            const fullSha = '${{ github.sha }}';
            const prNumber = context.issue.number;
            const actor = '${{ github.actor }}';
            const timestamp = new Date().toISOString();
            
            // Create GitHub deployment record for preview
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: fullSha,
              environment: `preview-pr-${prNumber}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              description: `Preview deploy for PR #${prNumber}`
            });
            
            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: url,
                description: `Preview deployed for commit ${sha}`
              });
            }
            
            // Comment on the PR
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployed\n\n| Property | Value |\n|----------|-------|\n| **URL** | ${url} |\n| **Commit** | \`${sha}\` |\n| **Branch** | \`${{ github.head_ref }}\` |\n| **Deployed** | ${timestamp} |\n\nThis preview will be updated on each push.\n\n---\n*Manifest hash available at ${url}/manifest.json*`
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # STAGING DEPLOY (Requires staging environment approval)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.xtx396.com
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
      
      - name: Deploy to Staging
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --alias=staging
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Notify staging deploy
        run: |
          echo "✅ Deployed to staging"
          echo "URL: https://staging.xtx396.com"
          echo "Commit: ${{ github.sha }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # PRODUCTION DEPLOY (Requires production environment approval)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'production'
    environment:
      name: production
      url: https://xtx396.com
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: dist/
      
      - name: Check deployment window
        run: |
          HOUR=$(TZ="America/New_York" date +%H)
          DAY=$(TZ="America/New_York" date +%u)
          
          echo "Current hour (ET): $HOUR"
          echo "Current day: $DAY (1=Mon, 7=Sun)"
          
          # Warn if outside deployment window (Mon-Thu, 9AM-4PM ET)
          if [ "$DAY" -gt 4 ]; then
            echo "⚠️ WARNING: Deploying outside recommended window (weekday)"
          fi
          
          if [ "$HOUR" -lt 9 ] || [ "$HOUR" -gt 16 ]; then
            echo "⚠️ WARNING: Deploying outside recommended window (9AM-4PM ET)"
          fi
      
      - name: Record pre-deploy state
        id: pre_deploy
        run: |
          # Record current production commit for rollback
          echo "pre_deploy_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      
      - name: Deploy to Production
        id: deploy
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=dist --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Verify deployment
        run: |
          echo "Verifying production deployment..."
          
          # Basic health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://xtx396.com)
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed: HTTP $HTTP_CODE"
            exit 1
          fi
          
          echo "✅ Production deployment verified"
      
      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.sha }}'.substring(0, 7);
            const fullSha = '${{ github.sha }}';
            const url = 'https://xtx396.com';
            const timestamp = new Date().toISOString();
            const actor = '${{ github.actor }}';
            
            // Create a deployment tag
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/deploy-prod-${sha}`,
              sha: context.sha
            }).catch(() => console.log('Tag may already exist'));
            
            // Create GitHub deployment record
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: fullSha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Production deploy by ${actor}`
            });
            
            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: url,
                description: `Deployed commit ${sha} to production`
              });
            }
            
            console.log(`Production deployment recorded: ${sha} at ${timestamp}`);
            console.log(`Deployed by: ${actor}`);
            
            // Output deployment metadata with provenance for audit
            const fs = require('fs');
            
            // Read provenance from build artifact
            let provenance = null;
            try {
              provenance = JSON.parse(fs.readFileSync('./dist/provenance.json', 'utf8'));
            } catch (e) {
              console.log('Provenance file not found, continuing without it');
            }
            
            const deployMeta = {
              environment: 'production',
              commitSha: fullSha,
              branch: '${{ github.ref_name }}',
              deployedAt: timestamp,
              deployedBy: actor,
              approvedBy: actor,
              verification: {
                signatureVerified: '${{ needs.build.outputs.signature_verified }}' === 'true',
                signatureReason: '${{ needs.build.outputs.signature_reason }}'
              },
              provenance: provenance ? {
                workflowRunId: provenance.workflowRunId,
                manifestHash: provenance.manifestHash,
                provenanceHash: provenance.provenanceHash,
                artifactSize: provenance.artifactSize,
                fileCount: provenance.fileCount,
                builtAt: provenance.builtAt
              } : null
            };
            
            console.log('Deploy metadata:', JSON.stringify(deployMeta, null, 2));

  # ─────────────────────────────────────────────────────────────────────────────
  # POST-DEPLOY NOTIFICATION
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [setup, deploy-preview, deploy-staging, deploy-production]
    if: always() && needs.setup.outputs.should_deploy == 'true'
    
    steps:
      - name: Deployment summary
        run: |
          ENV="${{ needs.setup.outputs.environment }}"
          SHA="${{ github.sha }}"
          
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${ENV} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u +%Y-%m-%dT%H:%M:%SZ) |" >> $GITHUB_STEP_SUMMARY
