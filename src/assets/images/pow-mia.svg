<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000">
  <defs>
    <style>
      .text-white { fill: #ffffff; font-family: Arial, sans-serif; font-weight: bold; }
      .silhouette { fill: #ffffff; }
    </style>
  </defs>
  
  <rect width="1500" height="1000" fill="#000000"/>
  
  <text x="750" y="140" class="text-white" font-size="90" text-anchor="middle" letter-spacing="12">POW</text>
  <text x="750" y="145" class="text-white" font-size="70" text-anchor="middle">★</text>
  <text x="750" y="140" class="text-white" font-size="90" text-anchor="middle" letter-spacing="12"> MIA</text>
  
  <g transform="translate(750, 500)">
    <circle class="silhouette" cx="0" cy="0" r="180" fill="none" stroke="#ffffff" stroke-width="12"/>
    
    <g transform="translate(0, -40)">
      <ellipse class="silhouette" cx="0" cy="-50" rx="55" ry="70"/>
      
      <rect class="silhouette" x="-50" y="-10" width="100" height="80" rx="5"/>
      
      <rect class="silhouette" x="-60" y="70" width="50" height="90" rx="5"/>
      <rect class="silhouette" x="10" y="70" width="50" height="90" rx="5"/>
      
      <rect class="silhouette" x="-70" y="160" width="40" height="60" rx="5"/>
      <rect class="silhouette" x="30" y="160" width="40" height="60" rx="5"/>
      
      <polygon class="silhouette" points="-65,-60 -75,-100 -85,-120 -75,-120 -70,-100 -60,-80"/>
      <polygon class="silhouette" points="65,-60 75,-100 85,-120 75,-120 70,-100 60,-80"/>
    </g>
    
    <path class="silhouette" d="M -150,150 L -130,190 L -110,170 M 110,170 L 130,190 L 150,150" stroke-width="8" fill="none" stroke="#ffffff"/>
  </g>
  
  <text x="750" y="900" class="text-white" font-size="68" text-anchor="middle" letter-spacing="6">YOU ARE NOT FORGOTTEN</text>
</svg>
