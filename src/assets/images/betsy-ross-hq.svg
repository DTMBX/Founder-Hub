<!-- Betsy Ross Flag (13 Stars, 13 Stripes) - High Quality SVG -->
<!-- Public domain: Historical U.S. flag design -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 1000" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Five-pointed star -->
    <polygon id="star" points="0,-21 6,-7 21,-7 9,4 13,19 0,10 -13,19 -9,4 -21,-7 -6,-7" fill="#fff"/>
  </defs>
  
  <!-- Red background (covers all stripes initially) -->
  <rect width="1900" height="1000" fill="#B22234"/>
  
  <!-- White stripes (6 white stripes: positions 2,4,6,8,10,12) -->
  <rect y="76.923" width="1900" height="76.923" fill="#fff"/>
  <rect y="230.769" width="1900" height="76.923" fill="#fff"/>
  <rect y="384.615" width="1900" height="76.923" fill="#fff"/>
  <rect y="538.462" width="1900" height="76.923" fill="#fff"/>
  <rect y="692.308" width="1900" height="76.923" fill="#fff"/>
  <rect y="846.154" width="1900" height="76.923" fill="#fff"/>
  
  <!-- Blue canton (union) -->
  <rect width="760" height="538.462" fill="#3C3B6E"/>
  
  <!-- 13 stars in a circle (Betsy Ross pattern) -->
  <g transform="translate(380, 269.231)">
    <!-- Outer circle of 13 stars, radius ~140 -->
    <use href="#star" transform="translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(27.69) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(55.38) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(83.08) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(110.77) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(138.46) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(166.15) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(193.85) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(221.54) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(249.23) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(276.92) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(304.62) translate(0, -140) scale(1.8)"/>
    <use href="#star" transform="rotate(332.31) translate(0, -140) scale(1.8)"/>
  </g>
</svg>
