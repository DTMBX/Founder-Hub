<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" width="1500" height="1000">
  <defs>
    <style>
      .pine-tree { fill: #0d4d2a; }
      .text-fill { fill: #0d4d2a; font-family: 'Georgia', serif; font-weight: bold; }
    </style>
  </defs>
  
  <rect width="1500" height="1000" fill="#ffffff"/>
  
  <text x="750" y="160" class="text-fill" font-size="72" text-anchor="middle" letter-spacing="8">AN APPEAL TO HEAVEN</text>
  
  <g transform="translate(750, 550)">
    <polygon class="pine-tree" points="0,-220 -60,-140 -40,-140 -80,-60 -50,-60 -90,20 -50,20 -100,100 100,100 50,20 90,20 50,-60 80,-60 40,-140 60,-140"/>
    
    <rect class="pine-tree" x="-30" y="100" width="60" height="180"/>
    
    <ellipse class="pine-tree" cx="0" cy="100" rx="90" ry="30" opacity="0.3"/>
  </g>
</svg>
